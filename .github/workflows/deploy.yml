# ──────────────────────────────────────────────────────────
# 🚀 GitHub Pages 自動部署工作流程
# 使用 GitHub 官方推薦的 Actions (actions/deploy-pages)
# 觸發條件：Push 到 main 分支 / 手動觸發
# ──────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 當推送至 main 分支時自動觸發部署
  workflow_dispatch: # 也支援從 GitHub Actions 頁面手動觸發

# ── 權限設定 ──────────────────────────────────────────────
# 使用 GitHub Pages 官方部署方式需要這些權限
permissions:
  contents: read
  pages: write
  id-token: write

# ── 防止同時部署 ─────────────────────────────────────────
# 如果有新的部署被觸發，會自動取消正在進行的舊部署
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 1: 建置 (Build)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Build Project
        run: npm run build

      - name: 📤 Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 2: 部署 (Deploy)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # 等待 build job 完成後才執行
    steps:
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
