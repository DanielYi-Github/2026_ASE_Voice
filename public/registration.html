<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 ASE Voice - 報名系統</title>

    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FFC107;
            font-family: 'Arial', sans-serif;
        }

        #loader-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FFC107;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.5s ease-out;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(26, 26, 26, 0.15);
            border-top-color: #1A1A1A;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 24px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .loading-text {
            color: #1A1A1A;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 3px;
            animation: pulse 1.5s ease-in-out infinite;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.8);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.98);
            }
        }

        iframe {
            opacity: 0;
            transition: opacity 0.6s ease-in;
            position: relative;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="loader-container">
        <div class="loader"></div>
        <div class="loading-text" id="loading-text">表單載入中...</div>
    </div>

    <div style="width: 100%; height: 100vh; overflow: hidden; background-color: white;">
        <iframe id="gscript-iframe" src=""
            style="width: 100%; height: calc(100vh + 40px); border: none; margin-top: -40px;" onload="hideLoader()">
        </iframe>
    </div>

    <script>
        // 1. 解析網址帶來的語系參數 (例如 ?lang=en)
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'zh'; // 預設為繁體中文
        const email = urlParams.get('email') || null;
        const timestamp = urlParams.get('timestamp') || null;
        const nonce = urlParams.get('nonce') || null;
        const hash = urlParams.get('hash') || null;

        // 2. 定義多語系字典
        const i18n = {
            'zh': {
                title: '2026 ASE Voice - 報名系統',
                loading: '表單載入中...',
                htmlLang: 'zh-TW'
            },
            'en': {
                title: '2026 ASE Voice - Registration',
                loading: 'Loading Form...',
                htmlLang: 'en'
            },
            'vi': {
                title: '2026 ASE Voice - Đăng ký',
                loading: 'Đang tải biểu mẫu...',
                htmlLang: 'vi'
            }
        };

        // 3. 套用對應的語系到載入畫面與 Meta
        const currentLang = i18n[lang] || i18n['zh'];
        document.title = currentLang.title;
        document.documentElement.lang = currentLang.htmlLang;
        document.getElementById('loading-text').textContent = currentLang.loading;

        // 4. 將語系參數也一起傳給 Google Apps Script iframe
        const iframe = document.getElementById('gscript-iframe');
        let baseUrl = 'https://script.google.com/macros/s/AKfycbxh75Ek3GCurGj7FCpser5GgJK2LlqyUTA9Li_wLe6LYZKeP8cIu2zdki2bLkdIFfQ/exec';
        // 開始拼接
        baseUrl += '?lang=' + lang; // 第一個參數用 ?
        if (email) baseUrl += '&email=' + encodeURIComponent(email);
        if (timestamp) baseUrl += '&timestamp=' + timestamp;
        if (nonce) baseUrl += '&nonce=' + nonce;
        if (hash) baseUrl += '&hash=' + hash;

        iframe.src = baseUrl;

        // --- 以下為原本的 Loader 隱藏邏輯 ---
        function hideLoader() {
            const loader = document.getElementById('loader-container');
            loader.style.opacity = '0';
            iframe.style.opacity = '1';

            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }

        setTimeout(() => {
            const loader = document.getElementById('loader-container');
            if (loader.style.display !== 'none') {
                hideLoader();
            }
        }, 5500);
    </script>
</body>

</html>
