<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <!--
        viewport-fit=cover：讓 iOS 上 env(safe-area-inset-*) 才有效用，
        避開瀏海與 Home Indicator
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>2026 ASE Voice - 報名系統</title>

    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            background-color: #FFC107;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Loading overlay */
        #loader-container {
            position: fixed;
            inset: 0;
            background-color: #FFC107;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.5s ease-out;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(26, 26, 26, 0.15);
            border-top-color: #1A1A1A;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 24px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .loading-text {
            color: #1A1A1A;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 3px;
            animation: pulse 1.5s ease-in-out infinite;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.8);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }

        /*
         * iframe 容器：position:fixed 貼滿全螢幕可見區域。
         *
         * 策略分析：
         * - top/left/right = 0  →  三邊固定
         * - bottom = 0          →  底部先固定為 0
         * - height = 100dvh     →  dvh (Dynamic Viewport Height) 在 Android Chrome
         *                          會隨工具列顯隱動態調整，確保不被工具列遮住。
         *                          iOS Safari 14.5+ 也完整支援。
         *
         * 關於 safe-area-inset-bottom：
         * - 需要 viewport-fit=cover 才有效
         * - iOS Home Indicator 約 34px（iPhone X+）
         * - Android 手勢導覽模式同樣會有此值（~24px）
         * - 舊版 Android 三鍵導覽列：瀏覽器通常已扣除，safe-area 為 0
         * - 用 max() 確保至少有 0px，不影響無此特性的瀏覽器
         *
         * padding-bottom 將 Google Form 的「送出」按鈕往上推，
         * 避免被 Home Indicator 或導覽列蓋住。
         */
        #iframe-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 100dvh;
            /* 把容器底部往上縮，讓按鈕不被系統 UI 遮住 */
            padding-bottom: max(env(safe-area-inset-bottom, 0px), 0px);
            background-color: white;
            /* overflow:hidden 讓 margin-top 負值裁切頂部 Google Form banner */
            overflow: hidden;
        }

        /*
         * iframe 本身：
         * - margin-top: -40px → 向上移動裁切 Google Form 頂部多餘 banner
         * - height: calc(100% + 40px) → 補回被 margin-top 佔用的高度，
         *   確保底部「送出」按鈕仍在容器可見範圍內
         */
        #gscript-iframe {
            display: block;
            border: none;
            width: 100%;
            height: calc(100% + 40px);
            margin-top: -40px;
            opacity: 0;
            transition: opacity 0.6s ease-in;
        }
    </style>
</head>

<body>
    <div id="message-container" style="position: fixed; inset: 0; background-color: #FFC107; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50; padding: 20px;">
        <div id="message-text" style="color: #1A1A1A; font-size: 2rem; font-weight: 900; letter-spacing: 2px; text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.8); text-align: center; line-height: 1.5;">
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lang = urlParams.get('lang') || 'zh';
        
        const i18n = {
            'zh': {
                title: '2026 ASE Voice - 報名已截止',
                message: '報名已截止，<br>敬請期待 7/8 公布晉級決賽名單！',
                htmlLang: 'zh-TW'
            },
            'en': {
                title: '2026 ASE Voice - Registration Closed',
                message: 'Registration is closed.<br>Please stay tuned for the finalists announcement on July 8th!',
                htmlLang: 'en'
            },
            'vi': {
                title: '2026 ASE Voice - Đăng ký đã đóng',
                message: 'Đăng ký đã đóng.<br>Vui lòng đón chờ danh sách thí sinh lọt vào vòng chung kết vào ngày 8 tháng 7!',
                htmlLang: 'vi'
            }
        };

        const currentLang = i18n[lang] || i18n['zh'];
        document.title = currentLang.title;
        document.documentElement.lang = currentLang.htmlLang;
        document.getElementById('message-text').innerHTML = currentLang.message;
    </script>
</body>

</html>
