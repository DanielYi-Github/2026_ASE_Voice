name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 當推送至 main 分支時觸發部署

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必須賦予 Action 寫入此 Repo 的權限 (用來推播回 gh-pages)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # 自動幫我們將 dist 資料夾上傳到 gh-pages 分支
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
